coverage:
  status:
    project:
      src:
        informational: true
        paths: ["src/**", "!src/test/**"]
    patch:
      src:
        informational: true
        paths: ["src/**", "!src/test/**"]

component_management:
  default_rules:
    statuses:
      - type: project
      - type: patch

  individual_components:
    - component_id: app
      paths: ["src/app**"]
    - component_id: ghosttext
      paths: ["src/ghosttext**"]
    - component_id: util
      paths: ["src/util/**"]
    - component_id: other
      paths: ["src/**", "!src/app**", "!src/ghosttext**", "!src/test/**", "!src/util/**"]
